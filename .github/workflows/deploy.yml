name: Build and Deploy

on:
    push:
        branches:
            - main

# Give permission to write to the repository (needed for committing README)
permissions:
    contents: write

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Important for committing changes

            - name: Install Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install UV
              uses: astral-sh/setup-uv@v2
              with:
                  version: "latest"

            - name: Install dependencies
              run: uv sync

            - name: Build site + Update README
              run: uv run make build

            - name: Commit updated files (README + any other changes)
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # Add all changed files (mainly README.md, but safe for others too)
                  git add README.md

                  # Commit only if there are actual changes
                  if git diff --staged --quiet; then
                    echo "No changes to commit"
                  else
                    git commit -m "chore: update README.md and site [skip ci]"
                    git push
                  fi

            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./output
                  publish_branch: gh-pages
                  force_orphan: false
